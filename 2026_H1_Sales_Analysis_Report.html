<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 H1 Sales Analysis Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --navy: #0B1D3A;
    --blue: #1B4F9B;
    --blue-light: #3A7BD5;
    --accent: #00B894;
    --accent2: #FF6B6B;
    --gray-50: #F8F9FB;
    --gray-100: #EEF1F5;
    --gray-200: #D8DDE6;
    --gray-300: #B0B8C8;
    --gray-500: #6B7A90;
    --gray-700: #3D4A5C;
    --gray-900: #1A2332;
    --white: #FFFFFF;
    --green: #00B894;
    --red: #E74C3C;
    --orange: #F39C12;
    --shadow: 0 2px 12px rgba(11,29,58,0.08);
    --shadow-lg: 0 8px 32px rgba(11,29,58,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--gray-100);
    color: var(--gray-900);
    overflow: hidden;
    height: 100vh;
  }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    background: var(--navy);
    color: var(--white);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
  }
  .topbar-brand {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .topbar-info {
    font-size: 12px;
    opacity: 0.6;
  }
  .topbar-page {
    font-size: 13px;
    font-weight: 500;
    background: rgba(255,255,255,0.1);
    padding: 4px 14px;
    border-radius: 20px;
  }

  /* Slide area */
  .slide-container {
    flex: 1;
    overflow-y: auto;
    padding: 28px 40px 100px;
    scroll-behavior: smooth;
  }

  .slide {
    display: none;
    animation: fadeIn 0.35s ease;
  }
  .slide.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Cover slide */
  .cover {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 180px);
    text-align: center;
  }
  .cover-badge {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);
    background: rgba(27,79,155,0.08);
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 24px;
  }
  .cover h1 {
    font-size: 42px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.15;
    margin-bottom: 12px;
  }
  .cover .subtitle {
    font-size: 16px;
    color: var(--gray-500);
    margin-bottom: 40px;
  }
  .cover-meta {
    display: flex;
    gap: 40px;
    font-size: 14px;
    color: var(--gray-500);
  }
  .cover-meta span { font-weight: 600; color: var(--gray-700); }

  /* Section headers */
  .section-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    background: var(--blue);
    color: var(--white);
    font-size: 14px;
    font-weight: 700;
    border-radius: 8px;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .section-title {
    display: flex;
    align-items: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .section-sub {
    font-size: 13px;
    color: var(--gray-500);
    margin-left: 44px;
    margin-bottom: 24px;
  }

  /* Cards */
  .card {
    background: var(--white);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Summary boxes */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-box {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    padding: 20px 24px;
    text-align: center;
  }
  .summary-box .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray-500);
    margin-bottom: 12px;
  }
  .summary-box .value-with-unit {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
    margin: 6px 0;
  }
  .summary-box .value {
    font-size: 40px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1;
  }
  .summary-box .unit {
    font-size: 36px;
    font-weight: 500;
    color: var(--gray-500);
    line-height: 1;
  }
  .summary-box.positive .value { color: var(--green); }
  .summary-box.negative .value { color: var(--red); }

  /* Tables */
  .data-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 12px;
  }
  .data-table thead th {
    background: var(--navy);
    color: var(--white);
    padding: 10px 12px;
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
    font-size: 11px;
  }
  .data-table thead th:first-child {
    text-align: left;
    border-radius: 8px 0 0 0;
  }
  .data-table thead th:last-child {
    border-radius: 0 8px 0 0;
  }
  .data-table tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--gray-100);
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .data-table tbody td:first-child {
    text-align: left;
    font-weight: 500;
  }
  .data-table tbody tr:hover {
    background: rgba(27,79,155,0.03);
  }
  .data-table tbody tr.market-row td {
    font-weight: 700;
    background: var(--gray-50);
    border-top: 2px solid var(--gray-200);
  }
  .data-table tbody tr.child-row td:first-child {
    padding-left: 30px;
    font-weight: 400;
    color: var(--gray-700);
    font-size: 11px;
  }
  .data-table tbody tr.total-row td {
    font-weight: 800;
    background: var(--navy);
    color: var(--white);
    border: none;
  }
  .val-pos { color: var(--green); font-weight: 600; }
  .val-neg { color: var(--red); font-weight: 600; }

  /* Two column layout */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .col-card {
    background: var(--white);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
  }
  .col-card .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 14px;
  }

  /* Edit groups */
  .edit-group {
    margin-bottom: 16px;
  }
  .edit-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--gray-500);
    margin-bottom: 8px;
  }
  .edit-label.hl-label { color: var(--green); }
  .edit-label.ll-label { color: var(--red); }
  .edit-label.summary-label { color: var(--blue); }

  .editable {
    width: 100%;
    min-height: 60px;
    padding: 12px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    color: var(--gray-900);
    resize: none;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: var(--gray-50);
  }
  .editable:focus {
    outline: none;
    border-color: var(--blue-light);
    box-shadow: 0 0 0 3px rgba(58,123,213,0.12);
    background: var(--white);
  }

  /* Edit table */
  .edit-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-bottom: 10px;
  }
  .edit-table th {
    background: var(--gray-100);
    padding: 8px 10px;
    font-size: 10px;
    font-weight: 700;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: left;
    border-bottom: 2px solid var(--gray-200);
  }
  .edit-table td {
    padding: 4px;
  }
  .edit-table .cell-input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
    resize: none;
    overflow: hidden;
    min-height: 36px;
    background: var(--gray-50);
  }
  .edit-table .cell-input:focus {
    outline: none;
    border-color: var(--blue-light);
    background: var(--white);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .btn-save, .btn-cancel, .btn-add, .btn-del {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
  }
  .btn-save {
    background: var(--blue);
    color: var(--white);
  }
  .btn-save:hover { background: var(--navy); }
  .btn-cancel {
    background: var(--gray-200);
    color: var(--gray-700);
  }
  .btn-cancel:hover { background: var(--gray-300); }
  .btn-add {
    background: var(--gray-100);
    color: var(--gray-700);
    border: 1px dashed var(--gray-300);
  }
  .btn-add:hover { background: var(--gray-200); }
  .btn-del {
    background: none;
    border: none;
    color: var(--gray-300);
    font-size: 16px;
    padding: 4px;
  }
  .btn-del:hover { color: var(--red); }

  .save-indicator {
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    margin-left: 8px;
  }
  .save-indicator.show { opacity: 1; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--white);
    border-top: 1px solid var(--gray-200);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  }
  .nav-btn {
    padding: 8px 24px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-btn.prev {
    background: var(--gray-100);
    color: var(--gray-700);
  }
  .nav-btn.prev:hover { background: var(--gray-200); }
  .nav-btn.next {
    background: var(--blue);
    color: var(--white);
  }
  .nav-btn.next:hover { background: var(--navy); }
  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .page-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .page-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gray-200);
    cursor: pointer;
    transition: all 0.2s;
  }
  .page-dot.active {
    background: var(--blue);
    width: 24px;
    border-radius: 4px;
  }
  .page-dot:hover:not(.active) {
    background: var(--gray-300);
  }
</style>

function getTableRows(tableId, defaultCols) {
  if (!tableRows[tableId]) {
    tableRows[tableId] = [defaultCols.map(() => '')];
  }
  return tableRows[tableId];
}

function addTableRow(tableId, numCols) {
  if (!tableRows[tableId]) tableRows[tableId] = [];
  tableRows[tableId].push(new Array(numCols).fill(''));
  render();
}

function removeTableRow(tableId, idx) {
  if (tableRows[tableId] && tableRows[tableId].length > 1) {
    tableRows[tableId].splice(idx, 1);
    render();
  }
}

function updateTableCell(tableId, rowIdx, colIdx, value) {
  if (tableRows[tableId] && tableRows[tableId][rowIdx]) {
    tableRows[tableId][rowIdx][colIdx] = value;
  }
}

function startEdit(sectionId) {
  editingSection = sectionId;
  render();
}

function saveEdit(sectionId) {
  showSaveIndicator(sectionId);
  editingSection = null;
  render();
}

// ===== DECOMPRESS ZEUC DATA =====
function decompressZEUCDataH1() {
  if (!window.pako) {
    console.error('pako library not loaded');
    return null;
  }
  
  try {
    const binaryString = atob(zeucCompressedH1);
    const bytes = new Uint8Array(binaryString.length);
    for (let i = 0; i < binaryString.length; i++) {
      bytes[i] = binaryString.charCodeAt(i);
    }
    const decompressed = pako.ungzip(bytes, { to: 'string' });
    const data = JSON.parse(decompressed);
    return data;
  } catch (e) {
    console.error('Decompression error:', e);
    return null;
  }
}

}

    let html = '';

        <td style="padding:12px; text-align:right; font-family:monospace">${formatRevenue(marketPy)}</td>
        <td style="padding:12px; text-align:right; font-family:monospace">${formatRevenue(marketCy)}</td>
        <td style="padding:12px; text-align:right; font-family:monospace">${formatRevenue(marketCy - marketPy)}</td>
        <td style="padding:12px; text-align:right; font-family:monospace">${formatRevenue(marketPy > 0 ? (((marketCy / marketPy) - 1) * 100) : null, true)}</td>
      </tr>`;

      totalPy += marketPy;
      totalCy += marketCy;

      if (isMarketExpanded) {
        Object.entries(marketData).forEach(([segment, segmentData]) => {
          if (state.segment && segment !== state.segment) return;

          const segKey = `seg_${market}_${segment}`;
          const isSegExpanded = expandState[segKey];

          let segPy = 0, segCy = 0;
          Object.entries(segmentData).forEach(([address, addressData]) => {
            Object.entries(addressData).forEach(([customer, custData]) => {
              segPy += custData.py || 0;
              segCy += custData.cy || 0;
            });
          });

          html += `<tr style="background-color:var(--gray-100); font-weight:500; cursor:pointer; border-bottom:1px solid var(--gray-200)" onclick="toggleCustomerExpand('${segKey}'); event.stopPropagation()">
            <td style="padding:12px; padding-left:36px; text-align:left; width:140px">${isSegExpanded ? '▼' : '▶'}</td>
            <td style="padding:12px; text-align:left; width:130px">${segment}</td>
            <td style="padding:12px"></td>
            <td style="padding:12px"></td>
            <td style="padding:12px; text-align:right; font-family:monospace; color:var(--blue)">${formatRevenue(segPy)}</td>
            <td style="padding:12px; text-align:right; font-family:monospace; color:var(--blue)">${formatRevenue(segCy)}</td>
            <td style="padding:12px; text-align:right; font-family:monospace; color:var(--blue)">${formatRevenue(segCy - segPy)}</td>
            <td style="padding:12px; text-align:right; font-family:monospace; color:var(--blue)">${formatRevenue(segPy > 0 ? (((segCy / segPy) - 1) * 100) : null, true)}</td>
          </tr>`;

          if (isSegExpanded) {
            Object.entries(segmentData).forEach(([address, addressData]) => {
              if (state.address && address !== state.address) return;

              const addrKey = `addr_${market}_${segment}_${address}`;
              const isAddrExpanded = expandState[addrKey];

              let addrPy = 0, addrCy = 0;
              Object.entries(addressData).forEach(([customer, custData]) => {
                addrPy += custData.py || 0;
                addrCy += custData.cy || 0;
              });

              html += `<tr style="background-color:var(--white); cursor:pointer; border-bottom:1px solid var(--gray-200)" onclick="toggleCustomerExpand('${addrKey}'); event.stopPropagation()">
                <td style="padding:12px"></td>
                <td style="padding:12px"></td>
                <td style="padding:12px; padding-left:36px; text-align:left; width:150px">${isAddrExpanded ? '▼' : '▶'} ${address}</td>
                <td style="padding:12px"></td>
                <td style="padding:12px; text-align:right; font-family:monospace; color:var(--gray-600)">${formatRevenue(addrPy)}</td>
                <td style="padding:12px; text-align:right; font-family:monospace; color:var(--gray-600)">${formatRevenue(addrCy)}</td>
                <td style="padding:12px; text-align:right; font-family:monospace; color:var(--gray-600)">${formatRevenue(addrCy - addrPy)}</td>
                <td style="padding:12px; text-align:right; font-family:monospace; color:var(--gray-600)">${formatRevenue(addrPy > 0 ? (((addrCy / addrPy) - 1) * 100) : null, true)}</td>
              </tr>`;

              if (isAddrExpanded) {
                Object.entries(addressData).forEach(([customer, custData]) => {
                  if (state.customer && customer !== state.customer) return;

                  const pyColor = getRevenueColor(custData.py || 0);
                  const cyColor = getRevenueColor(custData.cy || 0);
                  const changeColor = getRevenueColor((custData.cy || 0) - (custData.py || 0));
                  const grColor = getRevenueColor(custData.gr, true);

                  html += `<tr style="border-bottom:1px solid var(--gray-200)">
                    <td style="padding:12px"></td>
                    <td style="padding:12px"></td>
                    <td style="padding:12px"></td>
                    <td style="padding:12px; padding-left:60px; text-align:left; color:var(--gray-700); font-size:13px">${customer}</td>
                    <td style="padding:12px; text-align:right; color:${pyColor}; font-size:13px; font-family:monospace">${formatRevenue(custData.py || 0)}</td>
                    <td style="padding:12px; text-align:right; color:${cyColor}; font-size:13px; font-family:monospace">${formatRevenue(custData.cy || 0)}</td>
                    <td style="padding:12px; text-align:right; color:${changeColor}; font-size:13px; font-family:monospace">${formatRevenue((custData.cy || 0) - (custData.py || 0))}</td>
                    <td style="padding:12px; text-align:right; color:${grColor}; font-size:13px; font-family:monospace">${formatRevenue(custData.gr, true)}</td>
                  </tr>`;
                });
              }
            });
          }
        });
      }
    });

    return { html, totalPy, totalCy };
  }

  const { html: rowsHtml, totalPy, totalCy } = renderRows();
  const options = getFilterOptions();
  const state = window.customerFilterState;
  const totalChange = totalCy - totalPy;
  const totalGr = totalPy > 0 ? ((totalCy / totalPy - 1) * 100).toFixed(1) : null;

  return `
    <div class="section-title"><span class="section-num">11</span> 고객사 리스트 및 매출 분석</div>
    <div class="section-sub">EndUser Market Segment별 고객사 매출 현황 (2026년 H1 기준)</div>

    <div class="card">
      <div style="overflow-x:auto">
        <table class="data-table" style="width:100%; border-collapse:collapse; font-size:13px">
          <thead>
            <tr style="background-color:var(--navy); color:var(--white); position:sticky; top:0">
              <th style="text-align:left; padding:8px; font-weight:600; width:140px">
                <select onchange="window.customerFilterState.market=this.value; render()" style="width:100%; padding:6px; border:1px solid var(--gray-400); border-radius:3px; font-size:12px; background-color:var(--navy); color:var(--white)">
                  <option value="">Market Segment</option>
                  ${options.markets.map(m => `<option value="${m}" ${state.market === m ? 'selected' : ''}>${m}</option>`).join('')}
                </select>
              </th>
              <th style="text-align:left; padding:8px; font-weight:600; width:130px">
                <select onchange="window.customerFilterState.segment=this.value; render()" style="width:100%; padding:6px; border:1px solid var(--gray-400); border-radius:3px; font-size:12px; background-color:var(--navy); color:var(--white)">
                  <option value="">Customer Segment</option>
                  ${options.segments.map(s => `<option value="${s}" ${state.segment === s ? 'selected' : ''}>${s}</option>`).join('')}
                </select>
              </th>
              <th style="text-align:left; padding:8px; font-weight:600; width:150px">
                <select onchange="window.customerFilterState.address=this.value; render()" style="width:100%; padding:6px; border:1px solid var(--gray-400); border-radius:3px; font-size:12px; background-color:var(--navy); color:var(--white)">
                  <option value="">Address</option>
                  ${options.addresses.map(a => `<option value="${a}" ${state.address === a ? 'selected' : ''}>${a}</option>`).join('')}
                </select>
              </th>
              <th style="text-align:left; padding:8px; font-weight:600; flex:1; display:flex; align-items:center; gap:8px">
                <select onchange="window.customerFilterState.customer=this.value; render()" style="flex:1; padding:6px; border:1px solid var(--gray-400); border-radius:3px; font-size:12px; background-color:var(--navy); color:var(--white)">
                  <option value="">Customer Name</option>
                  ${options.customers.map(c => `<option value="${c}" ${state.customer === c ? 'selected' : ''}>${c}</option>`).join('')}
                </select>
                <button onclick="window.customerFilterState={market:'',segment:'',address:'',customer:''}; render()" style="padding:6px 12px; background:var(--gray-300); color:var(--navy); border:none; border-radius:3px; font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap">Reset</button>
              </th>
              <th style="text-align:right; padding:12px; font-weight:600; width:140px">PY Rev. (KRW)</th>
              <th style="text-align:right; padding:12px; font-weight:600; width:140px">CY Rev. (KRW)</th>
              <th style="text-align:right; padding:12px; font-weight:600; width:120px">Rev Change</th>
              <th style="text-align:right; padding:12px; font-weight:600; width:90px">GR%</th>
            </tr>
          </thead>
          <tbody>
            ${rowsHtml}
            <tr style="background-color:var(--navy); color:var(--white); font-weight:600">
              <td colspan="4" style="padding:12px">Total</td>
              <td style="text-align:right; padding:12px; font-family:monospace">${fmtFull(totalPy)}</td>
              <td style="text-align:right; padding:12px; font-family:monospace">${fmtFull(totalCy)}</td>
              <td style="text-align:right; padding:12px; font-family:monospace">${fmtFull(totalChange)}</td>
              <td style="text-align:right; padding:12px; font-family:monospace">${totalGr !== null ? totalGr + '%' : '-'}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  const slides = [
    renderCover(),
    renderSalesOverview(),
    renderSegmentHighlight('academic', 'Academic/Government', '#3A7BD5'),
    renderSegmentHighlight('pharma', 'Pharma/Biotech', '#00B894'),
    renderSegmentHighlight('clinical', 'Clinical', '#E74C3C'),
    renderForecastAndIssues(),
    renderExecutiveSummary(),
    renderIssuesRisk(),
    renderAdditionalSlides1(),
    renderAdditionalSlides2(),
    renderZEUCAccountAnalysis(),
    renderCustomerListAnalysis()
  ];

  app.innerHTML = `
    ${renderTopbar()}
    <div class="slide-container">
      ${slides.map((content, idx) => renderSlide(idx, content)).join('')}
    </div>
    ${renderBottomNav()}
  `;

  document.querySelectorAll('textarea').forEach(el => {
    autoResize(el);
    el.addEventListener('input', () => autoResize(el));
  });
}

function renderSlide(idx, content) {
  return `<div class="slide ${idx === currentSlide ? 'active' : ''}">${content}</div>`;
}

function renderTopbar() {
  const titles = [
    'Cover',
    '01 Sales Overview',
    '02 Academic/Government',
    '02 Pharma/Biotech',
    '02 Clinical',
    '03 Q2 Forecast',
    '04 Executive Summary',
    '05 Issues & Risk',
    'Additional 1',
    'Additional 2',
    '10 ZEUC Account Analysis',
    '11 고객사 리스트 및 매출 분석'
  ];
  const slideNum = String(currentSlide + 1).padStart(2, '0');
  const totalNum = String(totalSlides).padStart(2, '0');
  return `<div class="topbar">
    <div class="topbar-brand">Promega Korea · <span style="opacity:0.7">${slideNum}/${totalNum}</span></div>
    <div class="topbar-page">${titles[currentSlide]}</div>
    <div class="topbar-info">Invoice 기준 · ZEUC Segment</div>
  </div>`;
}

function renderBottomNav() {
  return `<div class="bottom-nav">
    <button class="nav-btn prev" ${currentSlide === 0 ? 'disabled' : ''} onclick="goToSlide(${currentSlide - 1})">← Previous</button>
    <div class="page-dots">
      ${Array.from({length: totalSlides}, (_, i) =>
        `<div class="page-dot ${i === currentSlide ? 'active' : ''}" onclick="goToSlide(${i})"></div>`
      ).join('')}
    </div>
    <button class="nav-btn next" ${currentSlide === totalSlides - 1 ? 'disabled' : ''} onclick="goToSlide(${currentSlide + 1})">Next →</button>
  </div>`;
}

function goToSlide(n) {
  if (n >= 0 && n < totalSlides) {
    currentSlide = n;
    render();
    document.querySelector('.slide-container').scrollTop = 0;
  }
}
