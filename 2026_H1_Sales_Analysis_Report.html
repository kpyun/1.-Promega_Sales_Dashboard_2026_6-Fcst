    --green: #00B894;
    --red: #E74C3C;

  /* Top bar */

    color: var(--white);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
  }
  .topbar-brand {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .topbar-info {
    font-size: 12px;
    opacity: 0.6;
  }
  .topbar-page {
    font-size: 13px;
    font-weight: 500;
    background: rgba(255,255,255,0.1);
    padding: 4px 14px;
    border-radius: 20px;
  }

  /* Slide area */
  .slide-container {
    flex: 1;
    overflow-y: auto;
    padding: 28px 40px 100px;
    scroll-behavior: smooth;
  }

  .slide {
    display: none;
    animation: fadeIn 0.35s ease;
  }
  .slide.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Cover slide */
  .cover {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 180px);
    text-align: center;
  }
  .cover-badge {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);

    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 24px;
  }
  .cover h1 {
    font-size: 42px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.15;
    margin-bottom: 12px;
  }
  .cover .subtitle {
    font-size: 16px;
    color: var(--gray-500);
    margin-bottom: 40px;
  }
  .cover-meta {
    display: flex;
    gap: 40px;
    font-size: 14px;
    color: var(--gray-500);
  }
  .cover-meta span { font-weight: 600; color: var(--gray-700); }

  /* Section headers */
  .section-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    background: var(--blue);
    color: var(--white);
    font-size: 14px;
    font-weight: 700;
    border-radius: 8px;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .section-title {
    display: flex;
    align-items: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .section-sub {
    font-size: 13px;
    color: var(--gray-500);
    margin-left: 44px;
    margin-bottom: 24px;
  }

  /* Cards */
  .card {
    background: var(--white);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Summary boxes */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-box {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    padding: 20px 24px;
    text-align: center;
  }
  .summary-box .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray-500);
    margin-bottom: 12px;
  }
  .summary-box .value-with-unit {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
    margin: 6px 0;
  }
  .summary-box .value {
    font-size: 40px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1;
  }
  .summary-box .unit {
    font-size: 36px;
    font-weight: 500;
    color: var(--gray-500);
    line-height: 1;
  }
  .summary-box.positive .value { color: var(--green); }
  .summary-box.negative .value { color: var(--red); }

  .data-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 12px;
  }
  .data-table thead th {
    background: var(--navy);
    color: var(--white);
    padding: 10px 12px;
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
    font-size: 11px;
  }
  .data-table thead th:first-child {
    text-align: left;
    border-radius: 8px 0 0 0;
  }
  .data-table thead th:last-child {
    border-radius: 0 8px 0 0;
  }
  .data-table tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--gray-100);
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .data-table tbody td:first-child {
    text-align: left;
    font-weight: 500;
  }
  .data-table tbody tr:hover {
    background: rgba(27,79,155,0.03);
  }
  .data-table tbody tr.market-row td {
    font-weight: 700;
    background: var(--gray-50);
    border-top: 2px solid var(--gray-200);
  }
  .data-table tbody tr.child-row td:first-child {
    padding-left: 30px;
    font-weight: 400;
    color: var(--gray-700);
    font-size: 11px;
  }
  .data-table tbody tr.total-row td {
    font-weight: 800;
    background: var(--navy);
    color: var(--white);
    border: none;
  }
  .val-pos { color: var(--green); font-weight: 600; }
  .val-neg { color: var(--red); font-weight: 600; }

    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;

  .col-card {
    background: var(--white);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);

    gap: 6px;
    align-items: center;

  .page-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gray-200);
    cursor: pointer;
    transition: all 0.2s;

  .page-dot.active {
    background: var(--blue);
    width: 24px;
    border-radius: 4px;
  }
  .page-dot:hover:not(.active) {
    background: var(--gray-300);

const fmt = (v) => {
  if (v === 0) return '0';
  const m = v / 1000000;
  if (Math.abs(m) >= 1000) return (m / 1000).toFixed(1) + 'B';
  return m.toFixed(1) + 'M';
};
const fmtFull = (v) => v.toLocaleString('ko-KR');
const fmtPct = (py, cy) => py === 0 ? '-' : ((cy / py - 1) * 100).toFixed(1) + '%';
const chgClass = (v) => v > 0 ? 'val-pos' : v < 0 ? 'val-neg' : '';
const chgSign = (v) => v > 0 ? '+' : '';

// ===== STATE =====
let currentSlide = 0;
const totalSlides = 13;
let editData = {};
let saveTimers = {};
let tableRows = {};
let editingSection = null;

function saveField(key, value) {
  editData[key] = value;
  showSaveIndicator(key);
}

function showSaveIndicator(key) {
  const el = document.querySelector(`.save-ind-${CSS.escape(key)}`);
  if (el) {
    el.classList.add('show');
    clearTimeout(saveTimers[key]);
    saveTimers[key] = setTimeout(() => el.classList.remove('show'), 1500);
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function getTableRows(tableId, defaultCols) {
  if (!tableRows[tableId]) {
    tableRows[tableId] = [defaultCols.map(() => '')];
  }
  return tableRows[tableId];
}

function addTableRow(tableId, numCols) {
  if (!tableRows[tableId]) tableRows[tableId] = [];
  tableRows[tableId].push(new Array(numCols).fill(''));
  render();
}

function removeTableRow(tableId, idx) {
  if (tableRows[tableId] && tableRows[tableId].length > 1) {
    tableRows[tableId].splice(idx, 1);
    render();
  }
}

function updateTableCell(tableId, rowIdx, colIdx, value) {
  if (tableRows[tableId] && tableRows[tableId][rowIdx]) {
    tableRows[tableId][rowIdx][colIdx] = value;
  }
}

function startEdit(sectionId) {
  editingSection = sectionId;
  render();
}

function saveEdit(sectionId) {
  showSaveIndicator(sectionId);
  editingSection = null;
  render();
}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  const slides = [
    renderCover(),
    renderSalesOverview(),
    renderSegmentTable(),
    renderProductTable(),
    renderSegmentHighlight('academic', 'Academic/Government', '#3A7BD5'),
    renderSegmentHighlight('pharma', 'Pharma/Biotech', '#00B894'),
    renderSegmentHighlight('clinical', 'Clinical', '#E74C3C'),
    renderCustomerComparison(),
    renderForecastAndIssues(),
    renderExecutiveSummary(),
    renderIssuesRisk(),
    renderAdditionalSlides1(),
    renderAdditionalSlides2()
  ];

  app.innerHTML = `
    ${renderTopbar()}
    <div class="slide-container">
      ${slides.map((content, idx) => renderSlide(idx, content)).join('')}
    </div>
    ${renderBottomNav()}
  `;

  document.querySelectorAll('textarea').forEach(el => {
    autoResize(el);
    el.addEventListener('input', () => autoResize(el));
  });
}

function renderSlide(idx, content) {
  return `<div class="slide ${idx === currentSlide ? 'active' : ''}">${content}</div>`;
}

function renderTopbar() {
  const titles = [
    'Cover',
    '01 Sales Overview',
    '01-A Segment Analysis',
    '01-B Product Family',
    '02 Academic/Government',
    '02 Pharma/Biotech',
    '02 Clinical',
    '03 고객사 매출 비교 리스트',
    '04 Q2 Forecast',
    '05 Executive Summary',
    '06 Issues & Risk',
    'Additional 1',
    'Additional 2'
  ];
  return `<div class="topbar">
    <div class="topbar-brand">Promega Korea</div>
    <div class="topbar-page">${titles[currentSlide]}</div>
    <div class="topbar-info">Invoice 기준 · ZEUC Segment</div>
  </div>`;
}

function renderBottomNav() {
  return `<div class="bottom-nav">
    <button class="nav-btn prev" ${currentSlide === 0 ? 'disabled' : ''} onclick="goToSlide(${currentSlide - 1})">← Previous</button>
    <div class="page-dots">
      ${Array.from({length: totalSlides}, (_, i) =>
        `<div class="page-dot ${i === currentSlide ? 'active' : ''}" onclick="goToSlide(${i})"></div>`
      ).join('')}
    </div>
    <button class="nav-btn next" ${currentSlide === totalSlides - 1 ? 'disabled' : ''} onclick="goToSlide(${currentSlide + 1})">Next →</button>
  </div>`;
}

function goToSlide(n) {
  if (n >= 0 && n < totalSlides) {
    currentSlide = n;
    render();
    document.querySelector('.slide-container').scrollTop = 0;
  }
}
