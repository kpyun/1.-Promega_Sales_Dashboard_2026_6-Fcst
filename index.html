<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promega Sales Dashboard 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0057A8;
      --blue-light: #1976D2;
      --blue-pale: #E3F0FB;
      --green: #1B8A4E;
      --green-pale: #E6F4EC;
      --red: #C0392B;
      --red-pale: #FDECEA;
      --orange: #E67E22;
      --orange-pale: #FEF3E2;
      --gray-100: #F5F7FA;
      --gray-200: #EAECF0;
      --gray-400: #9AA3AF;
      --gray-700: #374151;
      --text: #1A1F2E;
      --border: #D1D5DB;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-100);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--blue);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.2px; }
    header span { font-size: 12px; opacity: .75; }

    /* ── Layout ── */
    main { max-width: 1400px; margin: 0 auto; padding: 24px 20px 48px; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-bar label { font-size: 13px; font-weight: 600; color: var(--gray-700); }
    .filter-bar select, .filter-bar input[type="range"] {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }
    .filter-bar select:focus { outline: 2px solid var(--blue); outline-offset: 1px; }
    .badge {
      background: var(--blue);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
    }

    /* ── KPI Cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      border-top: 3px solid var(--blue);
      transition: transform .15s;
    }
    .kpi-card:hover { transform: translateY(-2px); }
    .kpi-card.green { border-top-color: var(--green); }
    .kpi-card.red   { border-top-color: var(--red); }
    .kpi-card.orange{ border-top-color: var(--orange); }
    .kpi-label { font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .kpi-value { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
    .kpi-sub   { font-size: 12px; margin-top: 4px; }
    .kpi-sub.up   { color: var(--green); }
    .kpi-sub.down { color: var(--red); }
    .kpi-sub.neutral { color: var(--gray-400); }

    /* ── Section title ── */
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-700);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    /* ── Chart grid ── */
    .chart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }

    .chart-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .chart-card h3 { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 16px; }
    .chart-wrap { position: relative; }
    .chart-wrap.tall { height: 280px; }
    .chart-wrap.med  { height: 220px; }

    /* ── Table ── */
    .table-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 8px 12px;
      border-bottom: 2px solid var(--gray-200);
    }
    thead th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--gray-200); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--gray-100); }
    tbody td { padding: 10px 12px; font-size: 13px; }
    tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .pill.over  { background: var(--green-pale);  color: var(--green); }
    .pill.under { background: var(--red-pale);    color: var(--red); }
    .pill.warn  { background: var(--orange-pale); color: var(--orange); }

    /* ── Progress bar ── */
    .progress-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--gray-200);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--blue);
      transition: width .6s ease;
    }
    .progress-bar-fill.over   { background: var(--green); }
    .progress-bar-fill.danger { background: var(--red); }
    .progress-pct { font-size: 12px; font-weight: 700; min-width: 38px; text-align: right; }

    /* ── Bottom charts ── */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 700px) { .bottom-grid { grid-template-columns: 1fr; } }

    /* ── Forecast note ── */
    .fcst-note {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--gray-200);
    }
  </style>
</head>
<body>

<header>
  <h1>Promega Sales Dashboard 2026</h1>
  <span id="updated">기준일: 2026-06-29</span>
</header>

<main>

  <!-- Filter bar -->
  <div class="filter-bar">
    <label>지역</label>
    <select id="regionFilter" onchange="applyFilter()">
      <option value="all">전체</option>
      <option value="서울/경기">서울/경기</option>
      <option value="중부">중부</option>
      <option value="영남">영남</option>
      <option value="호남">호남</option>
    </select>
    <label>제품군</label>
    <select id="catFilter" onchange="applyFilter()">
      <option value="all">전체</option>
      <option value="Cell Biology">Cell Biology</option>
      <option value="Nucleic Acid">Nucleic Acid</option>
      <option value="Protein">Protein</option>
      <option value="Detection">Detection</option>
    </select>
    <span class="badge" id="filterBadge">전체 데이터</span>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Main charts -->
  <div class="section-title">월별 매출 추이</div>
  <div class="chart-grid">
    <div class="chart-card">
      <h3>월별 실적 vs 목표 (단위: 백만원)</h3>
      <div class="chart-wrap tall"><canvas id="barChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>제품군별 매출 비중</h3>
      <div class="chart-wrap tall"><canvas id="donutChart"></canvas></div>
    </div>
  </div>

  <!-- Monthly table -->
  <div class="section-title">월별 상세 현황</div>
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>월</th>
          <th class="num">목표 (M원)</th>
          <th class="num">실적 (M원)</th>
          <th class="num">달성률</th>
          <th>달성 현황</th>
          <th class="num">전년 대비</th>
        </tr>
      </thead>
      <tbody id="monthlyTableBody"></tbody>
    </table>
    <p class="fcst-note">* 7월~12월은 Forecast 값 (음영 처리). 실적은 확정 기준.</p>
  </div>

  <!-- Bottom charts -->
  <div class="section-title">지역 · 담당자별 현황</div>
  <div class="bottom-grid">
    <div class="chart-card">
      <h3>지역별 H1 달성률 (%)</h3>
      <div class="chart-wrap med"><canvas id="regionChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>담당자별 H1 실적 순위 (M원)</h3>
      <div class="chart-wrap med"><canvas id="repChart"></canvas></div>
    </div>
  </div>

</main>

<script>
/* ═══════════════════════════════════════════════
   SAMPLE DATA — 실제 데이터로 교체하세요
   ═══════════════════════════════════════════════ */
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const FCST_START = 6; // 7월부터 Forecast

const rawData = {
  all: {
    target:  [320, 310, 380, 370, 400, 410, 420, 430, 450, 460, 470, 480],
    actual:  [335, 298, 392, 382, 415, 423,   0,   0,   0,   0,   0,   0],
    fcst:    [  0,   0,   0,   0,   0,   0, 418, 440, 458, 465, 480, 510],
    yoy:     [5.2, -3.1, 6.4, 4.8, 7.3, 8.1, null, null, null, null, null, null],
    prevYear:[318, 308, 368, 364, 387, 391, 405, 418, 432, 445, 460, 472],
  }
};

// 지역별 H1 데이터
const regionData = {
  labels: ['서울/경기','중부','영남','호남'],
  target: [820, 580, 640, 405],
  actual: [856, 571, 652, 386],
};

// 담당자별
const repData = {
  labels: ['김지수','이민준','박수연','최동훈','정아름','한승우'],
  actual: [285, 262, 248, 231, 215, 204],
  target: [270, 270, 240, 240, 210, 210],
};

// 제품군별 H1 실적
const catData = {
  labels: ['Cell Biology','Nucleic Acid','Protein','Detection'],
  values: [765, 618, 432, 430],
  colors: ['#0057A8','#1976D2','#42A5F5','#90CAF9'],
};

/* ═══════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════ */
const fmt = (n) => n == null ? '-' : n.toLocaleString('ko-KR', {maximumFractionDigits:0});
const fmtPct = (n) => n == null ? '-' : n.toFixed(1) + '%';
const clamp = (v, lo, hi) => Math.min(Math.max(v, lo), hi);

function getDisplayData(region, cat) {
  // For demo: modify values by region/category filter
  const base = rawData.all;
  const factors = { 'all':1, '서울/경기':1.05, '중부':0.72, '영남':0.80, '호남':0.50 };
  const catF    = { 'all':1, 'Cell Biology':0.33, 'Nucleic Acid':0.27, 'Protein':0.19, 'Detection':0.19 };
  const f = factors[region] * (cat === 'all' ? 1 : catF[cat] / catF['all']);

  return {
    target:   base.target.map(v => Math.round(v * f)),
    actual:   base.actual.map(v => v ? Math.round(v * f) : 0),
    fcst:     base.fcst.map(v => v ? Math.round(v * f) : 0),
    yoy:      base.yoy,
    prevYear: base.prevYear.map(v => Math.round(v * f)),
  };
}

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
let barChartInst, donutChartInst, regionChartInst, repChartInst;

/* ═══════════════════════════════════════════════
   KPI
   ═══════════════════════════════════════════════ */
function renderKPI(d) {
  const h1Actual = d.actual.slice(0,6).reduce((a,b)=>a+b,0);
  const h1Target = d.target.slice(0,6).reduce((a,b)=>a+b,0);
  const h1Rate   = h1Actual / h1Target * 100;
  const fullYearFcst = d.actual.slice(0,6).reduce((a,b)=>a+b,0) +
                       d.fcst.slice(6).reduce((a,b)=>a+b,0);
  const fullYearTarget = d.target.reduce((a,b)=>a+b,0);
  const fyRate = fullYearFcst / fullYearTarget * 100;
  const yoyAvg = d.yoy.filter(v=>v!=null).reduce((a,b)=>a+b,0)/6;

  const cards = [
    { label: 'H1 누계 실적', value: `${fmt(h1Actual)}M`, sub: `목표 ${fmt(h1Target)}M`, subClass: h1Rate>=100?'up':'down', color:'', icon:'📊' },
    { label: 'H1 달성률',    value: fmtPct(h1Rate),     sub: h1Rate>=100?'목표 초과 달성':'목표 미달', subClass: h1Rate>=100?'up':'down', color: h1Rate>=100?'green':'red' },
    { label: '연간 Forecast', value: `${fmt(fullYearFcst)}M`, sub: `연간 목표 ${fmt(fullYearTarget)}M (${fmtPct(fyRate)})`, subClass: fyRate>=100?'up':'warn', color:'orange' },
    { label: '전년 대비 (YoY)', value: fmtPct(yoyAvg), sub: 'H1 평균 성장률', subClass: yoyAvg>=0?'up':'down', color: yoyAvg>=0?'green':'red' },
  ];

  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = cards.map(c => `
    <div class="kpi-card ${c.color}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-sub ${c.subClass}">${c.sub}</div>
    </div>`).join('');
}

/* ═══════════════════════════════════════════════
   MONTHLY TABLE
   ═══════════════════════════════════════════════ */
function renderTable(d) {
  const tbody = document.getElementById('monthlyTableBody');
  tbody.innerHTML = MONTHS.map((m, i) => {
    const isFcst = i >= FCST_START;
    const tgt    = d.target[i];
    const act    = isFcst ? d.fcst[i] : d.actual[i];
    const rate   = act ? act / tgt * 100 : null;
    const yoy    = d.yoy[i];
    const rateStr = rate != null ? fmtPct(rate) : '—';
    const pillClass = rate == null ? '' : rate >= 100 ? 'over' : rate >= 90 ? 'warn' : 'under';
    const pillLabel = rate == null ? '—' : rate >= 100 ? '초과' : rate >= 90 ? '근접' : '미달';
    const barPct = rate ? clamp(rate, 0, 130) : 0;
    const barClass = rate >= 100 ? 'over' : rate < 90 ? 'danger' : '';
    const yoyStr = yoy != null ? (yoy >= 0 ? `+${yoy}%` : `${yoy}%`) : isFcst ? '<span style="color:var(--gray-400)">Fcst</span>' : '—';
    const rowStyle = isFcst ? 'background:#FAFBFC;color:#6B7280;' : '';

    return `<tr style="${rowStyle}">
      <td><strong>${m}</strong>${isFcst ? ' <small style="color:var(--orange);font-size:10px">FCST</small>' : ''}</td>
      <td class="num">${fmt(tgt)}</td>
      <td class="num">${act ? fmt(act) : '—'}</td>
      <td class="num">${rateStr}</td>
      <td style="min-width:160px">
        ${rate != null ? `<div class="progress-bar-wrap">
          <div class="progress-bar"><div class="progress-bar-fill ${barClass}" style="width:${Math.min(barPct,100)}%"></div></div>
          <span class="progress-pct" style="color:${rate>=100?'var(--green)':rate<90?'var(--red)':'var(--orange)'}">${rateStr}</span>
          <span class="pill ${pillClass}">${pillLabel}</span>
        </div>` : '—'}
      </td>
      <td class="num">${yoyStr}</td>
    </tr>`;
  }).join('');
}

/* ═══════════════════════════════════════════════
   BAR CHART
   ═══════════════════════════════════════════════ */
function renderBarChart(d) {
  const ctx = document.getElementById('barChart').getContext('2d');
  if (barChartInst) barChartInst.destroy();

  const combined = d.actual.map((v,i) => i < FCST_START ? v : d.fcst[i]);

  barChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: MONTHS,
      datasets: [
        {
          label: '목표',
          data: d.target,
          backgroundColor: 'transparent',
          borderColor: '#9AA3AF',
          borderWidth: 2,
          borderDash: [4,3],
          type: 'line',
          pointRadius: 3,
          pointBackgroundColor: '#9AA3AF',
          order: 0,
        },
        {
          label: '실적',
          data: d.actual.map((v,i) => i < FCST_START ? v : null),
          backgroundColor: '#0057A8',
          borderRadius: 4,
          order: 1,
        },
        {
          label: 'Forecast',
          data: d.fcst.map((v,i) => i >= FCST_START ? v : null),
          backgroundColor: '#90CAF9',
          borderRadius: 4,
          order: 2,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index' },
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12 }, boxWidth: 14 } },
        tooltip: {
          callbacks: {
            label: (ctx) => ` ${ctx.dataset.label}: ${fmt(ctx.raw)}M원`
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: {
          grid: { color: '#EAECF0' },
          ticks: {
            font: { size: 11 },
            callback: (v) => v + 'M'
          }
        }
      }
    }
  });
}

/* ═══════════════════════════════════════════════
   DONUT CHART
   ═══════════════════════════════════════════════ */
function renderDonutChart() {
  const ctx = document.getElementById('donutChart').getContext('2d');
  if (donutChartInst) donutChartInst.destroy();

  donutChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: catData.labels,
      datasets: [{
        data: catData.values,
        backgroundColor: catData.colors,
        borderWidth: 0,
        hoverOffset: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12 }, boxWidth: 14 } },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
              const pct = (ctx.raw/total*100).toFixed(1);
              return ` ${ctx.label}: ${fmt(ctx.raw)}M원 (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

/* ═══════════════════════════════════════════════
   REGION CHART
   ═══════════════════════════════════════════════ */
function renderRegionChart() {
  const ctx = document.getElementById('regionChart').getContext('2d');
  if (regionChartInst) regionChartInst.destroy();

  const rates = regionData.target.map((t,i) => +(regionData.actual[i]/t*100).toFixed(1));

  regionChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: regionData.labels,
      datasets: [{
        label: '달성률 (%)',
        data: rates,
        backgroundColor: rates.map(r => r>=100?'#1B8A4E': r>=90?'#E67E22':'#C0392B'),
        borderRadius: 6,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: (ctx) => ` ${ctx.raw}%` }
        }
      },
      scales: {
        x: {
          min: 80, max: 115,
          grid: { color: '#EAECF0' },
          ticks: { font: { size: 11 }, callback: v => v + '%' }
        },
        y: { grid: { display: false }, ticks: { font: { size: 12 } } }
      }
    }
  });
}

/* ═══════════════════════════════════════════════
   REP CHART
   ═══════════════════════════════════════════════ */
function renderRepChart() {
  const ctx = document.getElementById('repChart').getContext('2d');
  if (repChartInst) repChartInst.destroy();

  repChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: repData.labels,
      datasets: [
        {
          label: '실적',
          data: repData.actual,
          backgroundColor: '#0057A8',
          borderRadius: 4,
        },
        {
          label: '목표',
          data: repData.target,
          backgroundColor: 'transparent',
          borderColor: '#9AA3AF',
          borderWidth: 2,
          borderDash: [4,3],
          type: 'line',
          pointRadius: 3,
          pointBackgroundColor: '#9AA3AF',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12 }, boxWidth: 14 } },
        tooltip: {
          callbacks: { label: (ctx) => ` ${ctx.dataset.label}: ${fmt(ctx.raw)}M원` }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: {
          grid: { color: '#EAECF0' },
          ticks: { font: { size: 11 }, callback: v => v + 'M' }
        }
      }
    }
  });
}

/* ═══════════════════════════════════════════════
   APPLY FILTER
   ═══════════════════════════════════════════════ */
function applyFilter() {
  const region = document.getElementById('regionFilter').value;
  const cat    = document.getElementById('catFilter').value;
  const badge  = document.getElementById('filterBadge');

  const parts = [];
  if (region !== 'all') parts.push(region);
  if (cat    !== 'all') parts.push(cat);
  badge.textContent = parts.length ? parts.join(' · ') : '전체 데이터';

  const d = getDisplayData(region, cat);
  renderKPI(d);
  renderTable(d);
  renderBarChart(d);
}

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
function init() {
  const d = getDisplayData('all','all');
  renderKPI(d);
  renderTable(d);
  renderBarChart(d);
  renderDonutChart();
  renderRegionChart();
  renderRepChart();
}

init();
</script>
</body>
</html>
