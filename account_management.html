<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Management — Kyung-Hyun Pyun</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--s1:#111827;--s2:#1a2236;--s3:#232d42;--bd:#2a3550;--t:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--ac:#3b82f6;--ac2:#60a5fa;--gn:#10b981;--gn-bg:rgba(16,185,129,.1);--rd:#ef4444;--rd-bg:rgba(239,68,68,.1);--yl:#f59e0b;--pp:#8b5cf6;--cy:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,14,23,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--ac),var(--pp));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.hdr-t{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hdr-s{font-size:11px;color:var(--t3);margin-left:10px}
.wrap{max-width:1400px;margin:0 auto;padding:20px 28px 48px}
.fbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:8px 14px;display:flex;align-items:center;gap:8px}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--t);font-size:13px;font-family:inherit}
.search-box input::placeholder{color:var(--t3)}
.sel{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:8px 12px;color:var(--t2);font-size:12px;font-family:inherit;cursor:pointer;outline:none;min-width:120px}
.sel:focus{border-color:var(--ac)}
.pbar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.pbar-label{font-size:11px;color:var(--t3);font-weight:600;margin-right:4px;text-transform:uppercase;letter-spacing:.5px}
.pbtn{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:6px 14px;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.pbtn:hover{border-color:var(--ac);color:var(--t)}
.pbtn.on{border-color:var(--ac);background:rgba(59,130,246,.12);color:var(--ac2);font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:18px}
.st-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 16px}
.st-lb{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.st-v{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.tw{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);text-align:left;border-bottom:1px solid var(--bd);background:var(--s2);white-space:nowrap}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--s2)}
tbody tr:not(:last-child) td{border-bottom:1px solid rgba(42,53,80,.5)}
td{padding:9px 12px;font-size:12px;white-space:nowrap}
td.nm{font-weight:500;color:var(--t);max-width:260px;overflow:hidden;text-overflow:ellipsis}
td.num{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.r1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000}.r2{background:linear-gradient(135deg,#9ca3af,#6b7280);color:#fff}.r3{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}.rx{background:var(--s3);color:var(--t3)}
.growth{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.g-up{background:var(--gn-bg);color:var(--gn)}.g-dn{background:var(--rd-bg);color:var(--rd)}.g-new{background:rgba(139,92,246,.1);color:var(--pp)}.g-na{background:var(--s3);color:var(--t3)}
.bar-c{width:70px;height:5px;background:var(--s3);border-radius:3px;display:inline-block;vertical-align:middle;margin-left:6px}
.bar-f{height:100%;border-radius:3px;background:var(--ac)}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:9px;font-weight:600;white-space:nowrap}
.tag-pharma{background:rgba(139,92,246,.12);color:var(--pp)}.tag-clinical{background:rgba(219,39,119,.12);color:#db2777}.tag-acgov{background:rgba(6,182,212,.12);color:var(--cy)}.tag-applied{background:rgba(245,158,11,.12);color:var(--yl)}.tag-bio{background:rgba(16,185,129,.12);color:var(--gn)}
.expand-btn{background:none;border:none;color:var(--ac2);cursor:pointer;font-size:14px;padding:0 4px;transition:transform .2s;display:inline-block}
.expand-btn.open{transform:rotate(90deg)}
tr.child-row{display:none}tr.child-row.show{display:table-row}
tr.parent-row{cursor:pointer}tr.parent-row:hover{background:rgba(59,130,246,.05)}
.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.footer{text-align:center;font-size:10px;color:var(--t3);padding:20px 0}
@media(max-width:900px){.wrap{padding:12px}.stats{grid-template-columns:repeat(2,1fr)}.fbar{flex-direction:column}.tw{overflow-x:auto}}
</style>
</head>

    var s25=calcS(rec,"CY 2025",mo),s26=calcS(rec,"CY 2026",mo);
    var yoy=s25>0?((s26-s25)/s25*100):(s26>0?-1:null);
    return{s25:s25,s26:s26,yoy:yoy,l25:"CY 2025 1~"+ML[mo],l26:"CY 2026 1~"+ML[mo]};
  }
}
function fmt(n){if(!n||n===0)return"-";if(Math.abs(n)>=1e8)return"\u20A9"+(n/1e8).toFixed(1)+"\uC5B5";if(Math.abs(n)>=1e4)return"\u20A9"+Math.round(n/1e4).toLocaleString()+"\uB9CC";return"\u20A9"+Math.round(n).toLocaleString();}
function fYoY(v){
  if(v===null)return'<span class="growth g-na">-</span>';
  if(v===-1)return'<span class="growth g-new">NEW</span>';
  if(curP==="total")return'<span class="growth '+(v>=50?"g-up":"g-dn")+'">'+v.toFixed(0)+'%</span>';
  return'<span class="growth '+(v>=0?"g-up":"g-dn")+'">'+(v>=0?"+":"")+v.toFixed(1)+'%</span>';
}
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML;}

function render(){
  var q=document.getElementById("searchInput").value.toLowerCase();
  var fm=document.getElementById("fMkt").value;
  var fs=document.getElementById("fSeg").value;
  var so=document.getElementById("fSort").value;

  var recs=DATA.records.filter(function(r){
    if(fm!=="all"&&r.mkt!==fm)return false;
    if(fs!=="all"&&r.seg!==fs)return false;
    if(q&&r.addr.toLowerCase().indexOf(q)<0&&r.cust.toLowerCase().indexOf(q)<0)return false;
    return true;
  });

  recs=recs.map(function(r){var sp=getSP(r);return{mkt:r.mkt,seg:r.seg,addr:r.addr,cust:r.cust,region:r.region,city:r.city,m:r.m,s25:sp.s25,s26:sp.s26,yoy:sp.yoy};});

  var acg={},others=[];
  recs.forEach(function(r){
    if(r.mkt==="Academic/Government"){
      if(!acg[r.addr])acg[r.addr]={addr:r.addr,mkt:r.mkt,seg:r.seg,region:r.region,city:r.city,ch:[],s25:0,s26:0,isG:true,cust:r.addr};
      acg[r.addr].ch.push(r);acg[r.addr].s25+=r.s25;acg[r.addr].s26+=r.s26;
    }else{others.push(r);}
  });
  var gvals=Object.keys(acg).map(function(k){
    var g=acg[k];
    if(curP==="total"){g.yoy=g.s25>0?(g.s26/g.s25*100):(g.s26>0?-1:null);}
    else{g.yoy=g.s25>0?((g.s26-g.s25)/g.s25*100):(g.s26>0?-1:null);}
    return g;
  });

  var all=gvals.concat(others);
  if(so==="sales_desc")all.sort(function(a,b){return(b.s25+b.s26)-(a.s25+a.s26);});
  else if(so==="sales_asc")all.sort(function(a,b){return(a.s25+a.s26)-(b.s25+b.s26);});
  else if(so==="name_asc")all.sort(function(a,b){return(a.cust||a.addr).localeCompare(b.cust||b.addr,"ko");});
  else if(so==="growth_desc")all.sort(function(a,b){
    var ga=a.yoy===-1?9999:(a.yoy===null?-9999:a.yoy);
    var gb=b.yoy===-1?9999:(b.yoy===null?-9999:b.yoy);
    return gb-ga;
  });

  var sp0=getSP(DATA.records[0]);
  document.getElementById("th25").textContent=sp0.l25;
  document.getElementById("th26").textContent=sp0.l26;

  var totS25=0,totS26=0;
  all.forEach(function(r){totS25+=r.s25;totS26+=r.s26;});
  var totYoY=curP==="total"?(totS25>0?(totS26/totS25*100):0):(totS25>0?((totS26-totS25)/totS25*100):0);

  document.getElementById("statsRow").innerHTML=
    '<div class="st-card"><div class="st-lb">\uACE0\uAC1D\uC0AC \uC218</div><div class="st-v">'+all.length+'</div></div>'+
    '<div class="st-card"><div class="st-lb">'+esc(sp0.l25)+'</div><div class="st-v">'+fmt(totS25)+'</div></div>'+
    '<div class="st-card"><div class="st-lb">'+esc(sp0.l26)+'</div><div class="st-v">'+fmt(totS26)+'</div></div>'+
    '<div class="st-card"><div class="st-lb">YoY</div><div class="st-v">'+fYoY(totYoY)+'</div></div>';

  var tbody=document.getElementById("tbody");
  if(all.length===0){tbody.innerHTML='<tr><td colspan="8" class="empty">\uAC80\uC0C9 \uACB0\uACFC\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4</td></tr>';return;}

  var mx=Math.max.apply(null,all.map(function(r){return r.s25+r.s26;}).concat([1]));
  var h="",rk=0;
  all.forEach(function(r){
    rk++;
    var rc=rk<=3?"r"+rk:"rx";
    var tc=MT[r.mkt]||"tag-bio";
    var bw=((r.s25+r.s26)/mx*100).toFixed(1);

    if(r.isG){
      var gid="g"+r.addr.replace(/[^a-zA-Z0-9\uAC00-\uD7AF]/g,"_");
      var isO=!!expanded[r.addr];
      h+='<tr class="parent-row" data-gaddr="'+esc(r.addr)+'" data-gid="'+gid+'">';
      h+='<td><span class="rank-badge '+rc+'">'+rk+'</span></td>';
      h+='<td><span class="tag '+tc+'">'+esc(r.mkt)+'</span></td>';
      h+='<td style="font-size:10px;color:var(--t3)">'+esc(r.seg)+'</td>';
      h+='<td class="nm"><span class="expand-btn'+(isO?" open":"")+'">&#9654;</span> '+esc(r.addr)+' <span style="font-size:10px;color:var(--t3)">('+r.ch.length+')</span></td>';
      h+='<td style="font-size:11px;color:var(--t3)">'+esc(r.city)+'</td>';
      h+='<td class="num">'+fmt(r.s25)+'</td>';
      h+='<td class="num" style="color:var(--ac2)">'+fmt(r.s26)+'<div class="bar-c"><div class="bar-f" style="width:'+bw+'%"></div></div></td>';
      h+='<td class="num">'+fYoY(r.yoy)+'</td></tr>';
      r.ch.sort(function(a,b){return(b.s25+b.s26)-(a.s25+a.s26);});
      r.ch.forEach(function(c){
        h+='<tr class="child-row '+gid+(isO?" show":"")+'">';
        h+='<td></td><td></td><td></td>';
        h+='<td style="padding-left:38px;font-size:11px;color:var(--t2)">\u2514 '+esc(c.cust)+'</td>';
        h+='<td style="font-size:10px;color:var(--t3)">'+esc(c.city)+'</td>';
        h+='<td class="num" style="color:var(--t2)">'+fmt(c.s25)+'</td>';
        h+='<td class="num" style="color:var(--ac2)">'+fmt(c.s26)+'</td>';
        h+='<td class="num">'+fYoY(c.yoy)+'</td></tr>';
      });
    }else{
      h+='<tr><td><span class="rank-badge '+rc+'">'+rk+'</span></td>';
      h+='<td><span class="tag '+tc+'">'+esc(r.mkt)+'</span></td>';
      h+='<td style="font-size:10px;color:var(--t3)">'+esc(r.seg)+'</td>';
      h+='<td class="nm">'+esc(r.cust)+'</td>';
      h+='<td style="font-size:11px;color:var(--t3)">'+esc(r.city)+'</td>';
      h+='<td class="num">'+fmt(r.s25)+'</td>';
      h+='<td class="num" style="color:var(--ac2)">'+fmt(r.s26)+'<div class="bar-c"><div class="bar-f" style="width:'+bw+'%"></div></div></td>';
      h+='<td class="num">'+fYoY(r.yoy)+'</td></tr>';
    }
  });
  tbody.innerHTML=h;

  // Attach click events to parent rows
  document.querySelectorAll(".parent-row").forEach(function(tr){
    tr.addEventListener("click",function(){
      var addr=tr.getAttribute("data-gaddr");
      var gid=tr.getAttribute("data-gid");
      var btn=tr.querySelector(".expand-btn");
      if(expanded[addr]){
        delete expanded[addr];
        btn.classList.remove("open");
        document.querySelectorAll("."+gid).forEach(function(r){r.classList.remove("show");});
      }else{
        expanded[addr]=true;
        btn.classList.add("open");
        document.querySelectorAll("."+gid).forEach(function(r){r.classList.add("show");});
      }
    });
  });
}
// Key Account filtering
document.getElementById('keyAccCheck').addEventListener('change',function(){render();});

// Update stats display
var originalRender = render;
render = function(){
  originalRender();
  
  // Calculate stats
  var custCount = document.querySelectorAll('tbody tr:not(.child-row.hidden), tbody tr.child-row.show').length;
  var total = 0;
  document.querySelectorAll('tbody tr:not(.child-row) .num')[0]?.parentElement?.querySelectorAll('td.num').forEach(function(td, idx){
    if(idx >= 4 && idx <= 5){ // CY 2025 and CY 2026 columns
      var val = parseFloat(td.textContent.replace(/[^\d.]/g,''));
      if(!isNaN(val)) total += val;
    }
  });
  
  // Update stats cards
  var statsRow = document.getElementById('statsRow');
  if(statsRow && statsRow.textContent.trim()){
    var counts = statsRow.innerHTML.match(/\d+/g);
    if(!counts) statsRow.innerHTML = `
      <div class="st-card"><div class="st-lb">고객사 수</div><div class="st-v">${custCount}</div></div>
      <div class="st-card"><div class="st-lb">매출 합계</div><div class="st-v">${(total/100000000).toFixed(1)}억</div></div>
    `;
  }
};

render();
</script>
</body>
</html>
